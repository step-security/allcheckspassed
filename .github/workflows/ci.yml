name: Build Action
on:
  push:
    branches:
      - "main"
    paths:
      - "src/**"
  workflow_dispatch:
permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: install nodejs
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.4.0"
          cache: "npm"
      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Build action
        run: npm run build

      - name: Build Package
        run: npm run package
